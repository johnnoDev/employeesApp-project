{% extends 'base.html' %}
{% block title %}{{ titulo }} (VBF){% endblock %}
{% block content %}
<h1 class="mb-4">{{ titulo }} <small class="text-muted">(VBF)</small></h1>
<form method="post" class="col-md-6">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{% url 'fbv:empleado_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
