{% extends 'base.html' %}
{% block title %}Eliminar cargo (VBF){% endblock %}
{% block content %}
<h1 class="mb-4">Eliminar cargo <small class="text-muted">(VBF)</small></h1>
<p>¿Está seguro de que desea eliminar el cargo <strong>{{ cargo.nombre }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'fbv:cargo_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
