{% extends 'base.html' %}
{% block title %}{{ titulo }} (VBF){% endblock %}
{% block content %}
<h1 class="h3 page-header mb-4">{{ titulo }} <small class="text-muted">(VBF)</small></h1>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="{% url 'fbv:cargo_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
