{% extends 'base.html' %}
{% block title %}Eliminar cargo (VBC){% endblock %}
{% block content %}
<h1 class="h3 page-header mb-4">Eliminar cargo <small class="text-muted">(VBC)</small></h1>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <div class="alert alert-warning">¿Está seguro de que desea eliminar el cargo <strong>{{ cargo.nombre }}</strong>?</div>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                    <a href="{% url 'cbv:cargo_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
