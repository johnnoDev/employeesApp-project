{% extends 'base.html' %}
{% block title %}Cargos (VBC){% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center page-header mb-4">
    <h1 class="h3 mb-0">Cargos <small class="text-muted">(VBC)</small></h1>
    <a href="{% url 'cbv:cargo_create' %}" class="btn btn-success">+ Nuevo cargo</a>
</div>
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for cargo in cargos %}
                <tr>
                    <td>{{ cargo.nombre }}</td>
                    <td>{{ cargo.descripcion }}</td>
                    <td class="text-end">
                        <a href="{% url 'cbv:cargo_update' cargo.pk %}" class="btn btn-sm btn-outline-secondary">Editar</a>
                        <a href="{% url 'cbv:cargo_delete' cargo.pk %}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center text-muted py-4">No hay cargos registrados.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
