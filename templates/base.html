<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Empleados{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'empleados:home' %}">EmpleadosApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><span class="nav-link disabled">VBF:</span></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'fbv:cargo_list' %}">Cargos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'fbv:empleado_list' %}">Empleados</a></li>
                    <li class="nav-item"><span class="nav-link disabled ms-3">VBC:</span></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'cbv:cargo_list' %}">Cargos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'cbv:empleado_list' %}">Empleados</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
